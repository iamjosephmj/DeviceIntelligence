# JitPack — single chained before_install so PATH / ANDROID_HOME survive on workers
# that spawn a fresh shell per YAML list item. Pass --sdk_root on every sdkmanager
# invocation (NDK license requirement). jdk: list form matches tag 0.5.0 layout.

jdk:
  - openjdk17

# One shell: downloads cmdline-tools, accepts licenses, installs packages.
before_install:
  - export ANDROID_SDK_ROOT="$HOME/android-sdk" && export ANDROID_HOME="$ANDROID_SDK_ROOT" && mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools" && curl -sSLo /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip && unzip -qo /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools" && mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" && export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" && chmod +x ./gradlew && mkdir -p "$ANDROID_SDK_ROOT/licenses" && printf "\n24333f8a63b6825ea9c5514f748d145ef07021\n" > "$ANDROID_SDK_ROOT/licenses/android-sdk-license" && printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license" && yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses && sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

install:
  - export ANDROID_SDK_ROOT="$HOME/android-sdk" && export ANDROID_HOME="$ANDROID_SDK_ROOT" && export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" && chmod +x ./gradlew && ./gradlew :deviceintelligence:publishToMavenLocal --no-daemon -x test --stacktrace
  - export ANDROID_SDK_ROOT="$HOME/android-sdk" && export ANDROID_HOME="$ANDROID_SDK_ROOT" && export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" && ./gradlew -p deviceintelligence-gradle publishToMavenLocal --no-daemon -x test --stacktrace
